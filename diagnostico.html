<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico gratuito — Empresa Inteligente</title>
<link rel="canonical" href="https://empresainteligente.ai/diagnostico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;
  --surface:#18181b;
  --surface2:#27272a;
  --border:#3f3f46;
  --red:#D70030;
  --red-dim:rgba(215,0,48,.15);
  --text:#fafafa;
  --muted:#a1a1aa;
  --green:#22c55e;
  --wa:#25D366;
  --font:'Inter',system-ui,sans-serif;
  --radius:12px;
}
html{height:100%;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100%;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(9,9,11,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.875rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-weight:700;font-size:1.05rem;letter-spacing:-.02em;color:var(--text)}
.nav-logo span{color:var(--red)}
.nav-back{font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:.35rem;transition:color .2s}
.nav-back:hover{color:var(--text)}
.nav-back svg{width:14px;height:14px}

/* MAIN */
main{flex:1;padding-top:56px;display:flex;flex-direction:column}
.chat-wrap{max-width:720px;width:100%;margin:0 auto;padding:2rem 1rem 6rem;flex:1;display:flex;flex-direction:column}

/* HEADER */
.chat-header{text-align:center;padding:2.5rem 0 2rem}
.chat-header h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:700;line-height:1.25;margin-bottom:.75rem}
.chat-header p{color:var(--muted);font-size:.95rem;max-width:480px;margin:0 auto}

/* PROGRESS */
.progress-bar{height:3px;background:var(--surface2);border-radius:99px;margin-bottom:2.5rem;overflow:hidden}
.progress-fill{height:100%;background:var(--red);border-radius:99px;transition:width .4s ease}

/* MESSAGES */
.messages{display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem}
.msg{display:flex;gap:.75rem;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-items:flex-start}
.msg.user{align-items:flex-start;flex-direction:row-reverse}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;border:1.5px solid var(--border)}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-placeholder{width:36px;height:36px;border-radius:50%;background:var(--surface2);flex-shrink:0}
.bubble{max-width:85%;padding:.75rem 1rem;border-radius:var(--radius);font-size:.925rem;line-height:1.55}
.msg.bot .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px}
.msg.user .bubble{background:var(--red-dim);border:1px solid rgba(215,0,48,.3);border-top-right-radius:4px;color:var(--text)}
.typing-dots{display:flex;gap:5px;padding:.6rem .75rem}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:dot 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{opacity:.3;transform:scale(.9)}30%{opacity:1;transform:scale(1)}}

/* OPTIONS */
.options-wrap{display:flex;flex-wrap:wrap;gap:.6rem;animation:msgIn .3s ease}
.opt-btn{padding:.6rem 1.1rem;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:.875rem;font-family:var(--font);cursor:pointer;transition:all .2s;white-space:nowrap}
.opt-btn:hover{border-color:var(--red);background:var(--red-dim);color:var(--text)}

/* TEXT INPUT */
.text-input-wrap{display:flex;gap:.6rem;animation:msgIn .3s ease}
.text-input{flex:1;padding:.7rem 1rem;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:.925rem;font-family:var(--font);outline:none;transition:border-color .2s}
.text-input:focus{border-color:var(--red)}
.text-input::placeholder{color:var(--muted)}
.text-send{padding:.7rem 1.1rem;border-radius:var(--radius);background:var(--red);border:none;color:#fff;font-size:.875rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity .2s;white-space:nowrap}
.text-send:hover{opacity:.85}
.text-send:disabled{opacity:.4;cursor:not-allowed}

/* PHONE INPUT */
.phone-input-wrap{display:flex;flex-direction:column;gap:.5rem;animation:msgIn .3s ease}
.phone-hint{font-size:.8rem;color:var(--muted)}
.phone-row{display:flex;gap:.6rem}
.phone-input{flex:1;padding:.7rem 1rem;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:.925rem;font-family:var(--font);outline:none;transition:border-color .2s}
.phone-input:focus{border-color:var(--wa)}
.phone-input::placeholder{color:var(--muted)}
.phone-send{padding:.7rem 1.2rem;border-radius:var(--radius);background:var(--wa);border:none;color:#fff;font-size:.875rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity .2s;white-space:nowrap}
.phone-send:hover{opacity:.85}
.phone-send:disabled{opacity:.4;cursor:not-allowed}

/* WHATSAPP ANIMATION */
.wa-anim{display:flex;flex-direction:column;align-items:center;gap:1.5rem;padding:2rem;animation:msgIn .5s ease}
.wa-icon{width:64px;height:64px;border-radius:50%;background:var(--wa);display:flex;align-items:center;justify-content:center;animation:waPulse 1.5s ease-in-out infinite}
@keyframes waPulse{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.4)}50%{box-shadow:0 0 0 16px rgba(37,211,102,0)}}
.wa-icon svg{width:32px;height:32px;fill:#fff}
.wa-text{text-align:center;font-size:.95rem;color:var(--muted);max-width:300px}
.wa-text strong{color:var(--text);display:block;font-size:1.05rem;margin-bottom:.35rem}
.wa-steps{display:flex;flex-direction:column;gap:.5rem;width:100%;max-width:340px}
.wa-step{display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);font-size:.85rem;color:var(--muted);transition:all .4s}
.wa-step.active{border-color:var(--wa);color:var(--text);background:rgba(37,211,102,.07)}
.wa-step.done{border-color:var(--border);color:var(--muted)}
.wa-step-icon{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.75rem;transition:all .4s}
.wa-step.active .wa-step-icon{background:var(--wa);color:#fff}
.wa-step.done .wa-step-icon{background:var(--green);color:#fff}

/* SLOT PICKER */
.slots-wrap{display:flex;flex-direction:column;gap:.75rem;animation:msgIn .3s ease;width:100%}
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.6rem}
.slot-btn{padding:.8rem 1rem;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:.85rem;font-family:var(--font);cursor:pointer;transition:all .2s;text-align:left;line-height:1.4}
.slot-btn:hover{border-color:var(--red);background:var(--red-dim)}
.slot-btn.selected{border-color:var(--red);background:var(--red-dim);outline:2px solid var(--red)}
.slot-date{font-weight:600;font-size:.9rem}
.slot-time{color:var(--muted);font-size:.8rem;margin-top:.15rem}
.slots-error{color:var(--red);font-size:.875rem;padding:.75rem;background:var(--red-dim);border-radius:var(--radius);border:1px solid rgba(215,0,48,.3)}
.confirm-btn{padding:.8rem 1.5rem;border-radius:var(--radius);background:var(--red);border:none;color:#fff;font-size:.925rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity .2s;align-self:flex-start;display:none}
.confirm-btn:hover{opacity:.85}
.confirm-btn.visible{display:block}

/* LOADING */
.loading-wrap{display:flex;align-items:center;gap:.75rem;color:var(--muted);font-size:.875rem;animation:msgIn .3s ease;padding:.5rem 0}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
footer{position:fixed;bottom:0;left:0;right:0;background:rgba(9,9,11,.9);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:.6rem 1rem;text-align:center;font-size:.75rem;color:var(--muted)}

/* MOBILE */
@media(max-width:520px){
  .chat-wrap{padding:1.5rem .75rem 5rem}
  .slots-grid{grid-template-columns:1fr 1fr}
  .bubble{max-width:92%}
}
</style>
</head>
<body>

<nav>
  <span class="nav-logo">Empresa<span>Inteligente</span></span>
  <a href="/" class="nav-back">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 12L6 8l4-4"/></svg>
    Voltar
  </a>
</nav>

<main>
<div class="chat-wrap">
  <div class="chat-header">
    <h1>Diagnóstico gratuito de IA</h1>
    <p>Responda 8 perguntas e a KTANA monta um plano personalizado para sua empresa.</p>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="messages" id="messages"></div>
  <div id="input-area"></div>
</div>
</main>

<footer>Empresa Inteligente &copy; 2026 &nbsp;·&nbsp; Seus dados são tratados com sigilo total</footer>

<script>
const CFG = {
  SLOTS_URL:       'https://n8n.ktana.ai/webhook/ei-slots',
  WEBHOOK:         'https://n8n.ktana.ai/webhook/ei-lead',
  PARTIAL_WEBHOOK: 'https://n8n.ktana.ai/webhook/ei-partial',
  AVATAR:          '/assets/ktana-cyberpunk.jpg',
  SESSAO:          '/sessao',
};

const QUESTIONS = [
  {
    id:'nome_empresa', type:'text', placeholder:'Ex: Distribuidora Silva',
    bot:'Olá! Sou a KTANA, especialista em IA para empresas. Antes de tudo — qual é o nome da sua empresa?',
  },
  {
    id:'tamanho', type:'options',
    bot:'Quantas pessoas trabalham na {nome_empresa}?',
    opts:['1–10 colaboradores','11–50 colaboradores','51–200 colaboradores','200+ colaboradores'],
  },
  {
    id:'area', type:'options',
    bot:'Qual é o setor da empresa?',
    opts:['Varejo / Distribuição','Indústria / Manufatura','Saúde / Clínicas','Serviços / Consultoria','Tecnologia / SaaS','Financeiro / Seguros','Outro'],
  },
  {
    id:'desafio', type:'options',
    bot:'Qual é o maior desafio operacional hoje?',
    opts:['Atendimento lento ao cliente','Processos manuais e repetitivos','Dificuldade em captar leads','Gestão ineficiente de equipe','Análise de dados limitada','Outro'],
  },
  {
    id:'ia_atual', type:'options',
    bot:'A empresa já usa alguma ferramenta de IA ou automação?',
    opts:['Não, nenhuma ainda','ChatGPT no dia a dia','Algum software com IA embutida','Automações básicas (planilhas, Zapier)','Sim, várias ferramentas'],
  },
  {
    id:'faturamento', type:'options',
    bot:'Qual é o faturamento médio mensal da empresa?',
    opts:['Até R$ 50 mil','R$ 50 mil – R$ 200 mil','R$ 200 mil – R$ 1 milhão','Acima de R$ 1 milhão'],
  },
  {
    id:'nome_lead', type:'text', placeholder:'Seu nome completo',
    bot:'Perfeito! E qual é o seu nome? (quem está respondendo)',
  },
  {
    id:'whatsapp', type:'phone',
    bot:'Ótimo, {nome_lead}! Última etapa — qual é o seu WhatsApp? Vou te mandar a confirmação por lá.',
  },
];

let step = 0;
const answers = {};
const msgs = document.getElementById('messages');
const inputArea = document.getElementById('input-area');

function $(sel){return document.querySelector(sel)}
function updateProgress(){$('#progress').style.width=(step/QUESTIONS.length*100)+'%'}
function scrollBottom(){setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}),80)}

function addBotMsg(text,isTyping=false){
  const wrap=document.createElement('div');
  wrap.className='msg bot';
  wrap.innerHTML=`
    <div class="avatar"><img src="${CFG.AVATAR}" alt="KTANA" onerror="this.parentElement.innerHTML='<div style=\'width:36px;height:36px;border-radius:50%;background:#D70030;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#fff\'>KT</div>'"></div>
    <div class="bubble">${isTyping?'<div class="typing-dots"><span></span><span></span><span></span></div>':text}</div>
  `;
  msgs.appendChild(wrap);
  scrollBottom();
  return wrap.querySelector('.bubble');
}

function addUserMsg(text){
  const wrap=document.createElement('div');
  wrap.className='msg user';
  wrap.innerHTML=`<div class="bubble">${text}</div>`;
  msgs.appendChild(wrap);
  scrollBottom();
}

function interpolate(str){
  return str.replace(/\{(\w+)\}/g,(_,k)=>answers[k]||'');
}

async function botSay(text, delay=600){
  const bubble=addBotMsg('',true);
  await sleep(delay);
  bubble.innerHTML=interpolate(text);
  scrollBottom();
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function clearInput(){inputArea.innerHTML=''}

function showTextInput(q){
  clearInput();
  const wrap=document.createElement('div');
  wrap.className='text-input-wrap';
  wrap.innerHTML=`
    <input class="text-input" type="text" placeholder="${q.placeholder||'Digite aqui...'}" autocomplete="off" id="txt-inp">
    <button class="text-send" id="txt-send">Enviar →</button>
  `;
  inputArea.appendChild(wrap);
  const inp=wrap.querySelector('#txt-inp');
  const btn=wrap.querySelector('#txt-send');
  inp.focus();
  function submit(){
    const val=inp.value.trim();
    if(!val)return;
    btn.disabled=true;
    answers[q.id]=val;
    addUserMsg(val);
    clearInput();
    nextStep();
  }
  btn.addEventListener('click',submit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit()});
}

function showOptions(q){
  clearInput();
  const wrap=document.createElement('div');
  wrap.className='options-wrap';
  q.opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=opt;
    btn.addEventListener('click',()=>{
      wrap.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
      answers[q.id]=opt;
      addUserMsg(opt);
      clearInput();
      nextStep();
    });
    wrap.appendChild(btn);
  });
  inputArea.appendChild(wrap);
  scrollBottom();
}

function showPhoneInput(q){
  clearInput();
  const wrap=document.createElement('div');
  wrap.className='phone-input-wrap';
  wrap.innerHTML=`
    <span class="phone-hint">Formato: (11) 99999-9999</span>
    <div class="phone-row">
      <input class="phone-input" type="tel" placeholder="(11) 99999-9999" id="ph-inp">
      <button class="phone-send" id="ph-send">Confirmar ✓</button>
    </div>
  `;
  inputArea.appendChild(wrap);
  const inp=wrap.querySelector('#ph-inp');
  const btn=wrap.querySelector('#ph-send');
  inp.focus();
  inp.addEventListener('input',()=>{
    let v=inp.value.replace(/\D/g,'');
    if(v.length>2)v=`(${v.slice(0,2)}) ${v.slice(2)}`;
    if(v.length>10)v=v.slice(0,10)+'-'+v.slice(10);
    inp.value=v.slice(0,15);
  });
  function submit(){
    const val=inp.value.replace(/\D/g,'');
    if(val.length<10){inp.style.borderColor='var(--red)';return;}
    btn.disabled=true;
    answers[q.id]=inp.value;
    addUserMsg(inp.value);
    clearInput();
    // Fire partial registration (non-blocking) so we can follow up if they abandon
    const sid=answers.session_id||(answers.session_id=crypto.randomUUID());
    fetch(CFG.PARTIAL_WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        session_id:sid,
        nome_lead:answers.nome_lead||answers.nome_empresa||'Lead',
        nome_empresa:answers.nome_empresa||'',
        whatsapp:inp.value,
        tamanho:answers.tamanho||'',
        area:answers.area||'',
        desafio:answers.desafio||'',
        ia_atual:answers.ia_atual||'',
        faturamento:answers.faturamento||'',
        ts:new Date().toISOString(),
      }),
    }).catch(()=>{});
    nextStep();
  }
  btn.addEventListener('click',submit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit()});
}

async function showWAAnimation(){
  clearInput();
  updateProgress();

  const steps=[
    {label:'Verificando disponibilidade de agenda…'},
    {label:'Conectando com a KTANA…'},
    {label:'Preparando seu diagnóstico…'},
    {label:'Buscando horários disponíveis…'},
  ];

  const wrap=document.createElement('div');
  wrap.className='wa-anim';
  wrap.innerHTML=`
    <div class="wa-icon">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.135.557 4.14 1.532 5.875L0 24l6.29-1.506A11.933 11.933 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.924 0-3.72-.503-5.277-1.381l-.379-.225-3.932.94.98-3.824-.248-.394A10.003 10.003 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
    </div>
    <div class="wa-text"><strong>Quase lá!</strong>Estamos preparando sua agenda personalizada</div>
    <div class="wa-steps" id="wa-steps">
      ${steps.map((s,i)=>`
        <div class="wa-step" id="wa-step-${i}">
          <div class="wa-step-icon" id="wa-icon-${i}">${i+1}</div>
          <span>${s.label}</span>
        </div>
      `).join('')}
    </div>
  `;
  inputArea.appendChild(wrap);
  scrollBottom();

  for(let i=0;i<steps.length;i++){
    await sleep(i===0?400:900);
    if(i>0){
      document.getElementById(`wa-step-${i-1}`).classList.remove('active');
      document.getElementById(`wa-step-${i-1}`).classList.add('done');
      document.getElementById(`wa-icon-${i-1}`).textContent='✓';
    }
    document.getElementById(`wa-step-${i}`).classList.add('active');
  }

  await sleep(800);
  document.getElementById(`wa-step-${steps.length-1}`).classList.remove('active');
  document.getElementById(`wa-step-${steps.length-1}`).classList.add('done');
  document.getElementById(`wa-icon-${steps.length-1}`).textContent='✓';

  await sleep(500);
  clearInput();
  await fetchAndShowSlots();
}

async function fetchAndShowSlots(){
  clearInput();
  const loadWrap=document.createElement('div');
  loadWrap.className='loading-wrap';
  loadWrap.innerHTML='<div class="spinner"></div><span>Buscando horários disponíveis…</span>';
  inputArea.appendChild(loadWrap);

  await botSay('Aqui estão os horários disponíveis para o seu diagnóstico. Escolha o melhor para você:',300);

  let slots=[];
  try{
    const r=await fetch(CFG.SLOTS_URL,{signal:AbortSignal.timeout(12000)});
    const d=await r.json();
    slots=d.slots||[];
  }catch(e){
    clearInput();
    const errWrap=document.createElement('div');
    errWrap.className='slots-wrap';
    errWrap.innerHTML=`
      <div class="slots-error">Não conseguimos buscar os horários agora. Por favor, tente novamente em instantes.</div>
      <button class="confirm-btn visible" onclick="location.reload()">Tentar novamente</button>
    `;
    inputArea.appendChild(errWrap);
    return;
  }

  if(!slots.length){
    clearInput();
    const errWrap=document.createElement('div');
    errWrap.className='slots-wrap';
    errWrap.innerHTML=`
      <div class="slots-error">Não há horários disponíveis esta semana. Por favor, entre em contato pelo WhatsApp para agendar.</div>
    `;
    inputArea.appendChild(errWrap);
    return;
  }

  clearInput();
  let selectedSlot=null;

  const wrap=document.createElement('div');
  wrap.className='slots-wrap';

  const grid=document.createElement('div');
  grid.className='slots-grid';

  slots.forEach(s=>{
    const btn=document.createElement('button');
    btn.className='slot-btn';
    const dt=new Date(s.start);
    const datePart=dt.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
    const timePart=dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    btn.innerHTML=`<div class="slot-date">${capitalize(datePart)}</div><div class="slot-time">${timePart} (30 min)</div>`;
    btn.addEventListener('click',()=>{
      grid.querySelectorAll('.slot-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedSlot=s;
      confirmBtn.classList.add('visible');
    });
    grid.appendChild(btn);
  });

  const confirmBtn=document.createElement('button');
  confirmBtn.className='confirm-btn';
  confirmBtn.textContent='Confirmar este horário →';
  confirmBtn.addEventListener('click',()=>{
    if(!selectedSlot)return;
    confirmBtn.disabled=true;
    confirmBtn.textContent='Agendando…';
    submitLead(selectedSlot);
  });

  wrap.appendChild(grid);
  wrap.appendChild(confirmBtn);
  inputArea.appendChild(wrap);
  scrollBottom();
}

function capitalize(str){return str.charAt(0).toUpperCase()+str.slice(1)}

async function submitLead(slot){
  const payload={
    session_id: answers.session_id||crypto.randomUUID(),
    slot_start: slot.start,
    slot_end:   slot.end,
    nome_empresa: answers.nome_empresa||'',
    tamanho:      answers.tamanho||'',
    area:         answers.area||'',
    desafio:      answers.desafio||'',
    ia_atual:     answers.ia_atual||'',
    faturamento:  answers.faturamento||'',
    nome_lead:    answers.nome_lead||'',
    whatsapp:     answers.whatsapp||'',
  };

  clearInput();
  const loadWrap=document.createElement('div');
  loadWrap.className='loading-wrap';
  loadWrap.innerHTML='<div class="spinner"></div><span>Confirmando seu agendamento…</span>';
  inputArea.appendChild(loadWrap);

  try{
    const r=await fetch(CFG.WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
      signal:AbortSignal.timeout(15000),
    });
    const d=await r.json();
    if(d.ok){
      const sid=d.session_id||payload.session_id;
      await botSay('Perfeito! Seu diagnóstico está agendado. Vou te mandar a confirmação no WhatsApp. 🎉',400);
      await sleep(1200);
      window.location.href=`${CFG.SESSAO}?id=${sid}`;
    }else{
      throw new Error('API returned not ok');
    }
  }catch(e){
    clearInput();
    const errWrap=document.createElement('div');
    errWrap.className='slots-wrap';
    errWrap.innerHTML=`<div class="slots-error">Ops! Ocorreu um erro ao confirmar. Por favor, tente novamente.</div>
    <button class="confirm-btn visible" onclick="location.reload()">Tentar novamente</button>`;
    inputArea.appendChild(errWrap);
  }
}

async function nextStep(){
  if(step>=QUESTIONS.length){
    await showWAAnimation();
    return;
  }
  updateProgress();
  const q=QUESTIONS[step];
  step++;
  await botSay(q.bot,500);
  if(q.type==='text') showTextInput(q);
  else if(q.type==='options') showOptions(q);
  else if(q.type==='phone') showPhoneInput(q);
}

// Start
(async()=>{
  await sleep(400);
  await botSay('Olá! Sou a <strong>KTANA</strong>, especialista em IA para empresas. Vou fazer 8 perguntas rápidas para montar um diagnóstico gratuito e personalizado para a sua empresa.',600);
  await sleep(300);
  nextStep();
})();
</script>
